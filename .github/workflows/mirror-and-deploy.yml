name: Mirror e Deploy

on:
  push:
    branches:
      - main
      - dev
      - prod

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout completo com histórico
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push pro repo público
        run: |
          git remote add public https://x-access-token:${{ secrets.PUBLIC_REPO_TOKEN }}@github.com/SEU_USUARIO/biblioo-backend.git
          git push public ${{ github.ref_name }}:${{ github.ref_name }} --force