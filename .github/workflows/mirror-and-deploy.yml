name: Mirror e Deploy

on:
  push:
    branches:
      - main
      - dev
      - prod

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout completo com histórico
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar git
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"

      - name: Push pro repo público
        env:
          TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: |
          git remote add public https://marcosffp:${TOKEN}@github.com/marcosffp/biblioo.git
          git push public ${{ github.ref_name }}:${{ github.ref_name }} --force
