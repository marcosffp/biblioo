# ──────────────────────────────────────────
# Application Info
# ──────────────────────────────────────────
spring.application.name=biblioo
spring.dotenv.path=.env

rate.limit.enabled=false
# ──────────────────────────────────────────
# MySQL / Database Context
# ──────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:${MYSQL_PORT:3307}/${MYSQL_DATABASE}?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP Properties
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.pool-name=BibliooHikariPool

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.defer-datasource-initialization=true

# SQL Initialization
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

# ──────────────────────────────────────────
# External APIs (Google, Cloudinary)
# ──────────────────────────────────────────
google.books.api-key=${GOOGLE_BOOKS_API_KEY}
cloudinary.url=${CLOUDINARY_URL}

# ──────────────────────────────────────────
# Redis & Caching
# ──────────────────────────────────────────
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

spring.cache.type=redis
spring.cache.redis.cache-null-values=false
spring.cache.redis.time-to-live=300000

# ──────────────────────────────────────────
# Multi-thread & Task Execution
# ──────────────────────────────────────────
spring.task.execution.pool.core-size=10
spring.task.execution.pool.max-size=50
spring.task.execution.pool.queue-capacity=1000
spring.task.execution.thread-name-prefix=biblioo-

# ──────────────────────────────────────────
# OpenSearch
# ──────────────────────────────────────────
opensearch.host=${OPENSEARCH_HOST:localhost}
opensearch.port=${OPENSEARCH_PORT:9200}

# ──────────────────────────────────────────
# Security / JWT
# ──────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.access-token-expiration=3600
jwt.refresh-token-expiration-days=7

# ──────────────────────────────────────────
# RabbitMQ / Messaging
# ──────────────────────────────────────────
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}
spring.rabbitmq.virtual-host=${RABBITMQ_VHOST:/}

# ──────────────────────────────────────────
# Multipart Upload Limits & Tomcat
# ──────────────────────────────────────────
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
server.tomcat.max-swallow-size=-1

# ──────────────────────────────────────────
# Neo4j Connections
# ──────────────────────────────────────────
neo4j.uri=${NEO4J_URI}
neo4j.authentication.username=${NEO4J_USER}
neo4j.authentication.password=${NEO4J_PASSWORD}
neo4j.connection-timeout=5000
neo4j.max-connection-pool-size=50

# Firebase (FCM push notifications)
firebase.service-account-base64=${FIREBASE_SERVICE_ACCOUNT_BASE64}

# ──────────────────────────────────────────
# Recommendations Config
# ──────────────────────────────────────────
# T1 — BECAUSE_YOU_READ
recommendation.t1.candidate-limit=20
recommendation.t1.min-co-readers=2
recommendation.t1.score-jitter-pct=0.03
recommendation.t1.max-same-category-ratio=0.60
