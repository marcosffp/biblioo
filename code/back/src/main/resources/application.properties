# ──────────────────────────────────────────
# Application
# ──────────────────────────────────────────
spring.application.name=biblioo
spring.dotenv.path=.env
rate.limit.enabled=false

# ──────────────────────────────────────────
# Database (MySQL)
# ──────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:${MYSQL_PORT}/${MYSQL_DATABASE}?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP (Connection Pool)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.pool-name=BibliooHikariPool
spring.datasource.hikari.leak-detection-threshold=2000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.defer-datasource-initialization=true
spring.jpa.open-in-view=false

# SQL Initialization
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

# ──────────────────────────────────────────
# Cache & Redis
# ──────────────────────────────────────────
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

spring.cache.type=redis
spring.cache.redis.cache-null-values=false
spring.cache.redis.time-to-live=300000

# ──────────────────────────────────────────
# Messaging (RabbitMQ)
# ──────────────────────────────────────────
spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.port=${RABBITMQ_PORT}
spring.rabbitmq.username=${RABBITMQ_USER}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}
spring.rabbitmq.virtual-host=${RABBITMQ_VHOST}

# STOMP (WebSocket relay)
spring.rabbitmq.stomp.port=${RABBITMQ_STOMP_PORT}

# ──────────────────────────────────────────
# OpenSearch
# ──────────────────────────────────────────
opensearch.host=${OPENSEARCH_HOST}
opensearch.port=${OPENSEARCH_PORT}

# ──────────────────────────────────────────
# Graph Database (Neo4j)
# ──────────────────────────────────────────
neo4j.uri=${NEO4J_URI}
neo4j.authentication.username=${NEO4J_USER}
neo4j.authentication.password=${NEO4J_PASSWORD}
neo4j.connection-timeout=5000
neo4j.max-connection-pool-size=50

# ──────────────────────────────────────────
# External APIs
# ──────────────────────────────────────────
google.books.api-key=${GOOGLE_BOOKS_API_KEY}
google.client-id=${GOOGLE_CLIENT_ID}
cloudinary.url=${CLOUDINARY_URL}
firebase.service-account-base64=${FIREBASE_SERVICE_ACCOUNT_BASE64}



# ──────────────────────────────────────────
# Security (JWT)
# ──────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.access-token-expiration=3600
jwt.refresh-token-expiration-days=7

# ──────────────────────────────────────────
# Async / Threads
# ──────────────────────────────────────────
spring.task.execution.pool.core-size=50
spring.task.execution.pool.max-size=200
spring.task.execution.pool.queue-capacity=5000
spring.task.execution.thread-name-prefix=biblioo-

# Virtual Threads (Java 21+)
spring.threads.virtual.enabled=true

# ──────────────────────────────────────────
# Upload & Server
# ──────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB
server.tomcat.max-swallow-size=-1


recommendation.db-concurrency-limit:18
# ──────────────────────────────────────────
# Recommendations Config
# ──────────────────────────────────────────
# T1 — BECAUSE_YOU_READ
recommendation.t1.candidate-limit=20
recommendation.t1.min-co-readers=2
recommendation.t1.score-jitter-pct=0.03
recommendation.t1.max-same-category-ratio=0.60

# T2 — FAVORITE_GENRE_NOW
recommendation.favorite-genre-now.candidate-limit=20
recommendation.favorite-genre-now.top-genres-count=3
recommendation.favorite-genre-now.min-reviews=10

# T4 — CATALOG_SURPRISE (Thompson Sampling / Multi-Armed Bandit)
recommendation.catalog-surprise.candidate-limit=20
recommendation.catalog-surprise.candidate-pool-multiplier=3
recommendation.catalog-surprise.distance-threshold=0.2
recommendation.catalog-surprise.min-rating=3.0
recommendation.catalog-surprise.min-rating-count=5
recommendation.catalog-surprise.alpha-prior=1
recommendation.catalog-surprise.beta-prior=1
recommendation.catalog-surprise.redis-ttl-days=90
recommendation.catalog-surprise.param-cap=30

# T5 — SIMILAR_AUTHORS (Collaborative Filtering)
recommendation.similar-authors.candidate-limit=20
recommendation.similar-authors.min-rating=4
recommendation.similar-authors.min-days-since-completed=7
recommendation.similar-authors.level1-limit=12
recommendation.similar-authors.level2-limit=10
recommendation.similar-authors.similar-users-limit=30

# T6 — REREAD_WORTH_IT (Spaced Repetition)
recommendation.reread-worth-it.candidate-limit=20
recommendation.reread-worth-it.min-days-since-read=90
recommendation.reread-worth-it.interval-base-multiplier-days=30
recommendation.reread-worth-it.reread-interval-factor=1.5

# T3 — TRENDING_IN_COMMUNITIES (Exponential Decay Scoring)
recommendation.trending-in-communities.comment-weight=2.0
recommendation.trending-in-communities.join-weight=0.5
recommendation.trending-in-communities.decay-per-hour=0.10
recommendation.trending-in-communities.min-score=0.1
recommendation.trending-in-communities.fallback-window-days=60
recommendation.trending-in-communities.trail-size=20
recommendation.trending-in-communities.deduplication-window-hours=24

# ──────────────────────────────────────────
# Feed
# ──────────────────────────────────────────
feed.fanout.write-threshold=10000
feed.fanout.batch-size=1000
feed.cache.ttl-minutes=30
feed.cache.sliding-window-threshold=0.7
feed.backfill.days=30
feed.cache.warm-size=200

# ──────────────────────────────────────────
# DNA Literário
# ──────────────────────────────────────────
dna.min-books-required=5
dna.themes.min-books=3
dna.themes.max-displayed=7
dna.snapshot.cron=0 0 1 1 * *

# ──────────────────────────────────────────
# Trending (Top 10 Communities & Books)
# ──────────────────────────────────────────
trending.limit=10
trending.window-hours=48
trending.book.min-interactions=3
trending.refresh-cron=0 */15 * * * *

# ──────────────────────────────────────────
# WebSocket / CORS
# ──────────────────────────────────────────
app.websocket.allowed-origins=${APP_WEBSOCKET_ALLOWED_ORIGINS}

# ──────────────────────────────────────────
# Logging
# ──────────────────────────────────────────
logging.level.com.biblioo.community=DEBUG
# ──────────────────────────────────────────
# Observabilidade (Actuator / Prometheus)
# ──────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.prometheus.metrics.export.enabled=true
management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.percentiles-histogram.http.server.requests=true


# ──────────────────────────────────────────
# Swagger UI (Springdoc)
# ──────────────────────────────────────────
springdoc.swagger-ui.doc-expansion=none
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.deepLinking=true
springdoc.swagger-ui.display-request-duration=true


# ──────────────────────────────────────────
# E-mail (SendGrid)
# ──────────────────────────────────────────
sendgrid.api.key=${SENDGRID_API_KEY}
sendgrid.from.email=${SENDGRID_FROM_EMAIL}

# ──────────────────────────────────────────
# Frontend URL (links nos e-mails)
# ──────────────────────────────────────────
app.frontend.url=${FRONTEND_URL}
app.password-reset.path=${PASSWORD_RESET_PATH}
app.mobile.deep-link.url=${MOBILE_DEEP_LINK_URL}
app.mobile.reset-path=${MOBILE_RESET_PATH}

# Gmail (App Password — não use sua senha normal)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_EMAIL}
spring.mail.password=${GMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

