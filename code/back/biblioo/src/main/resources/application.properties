# ══════════════════════════════════════════════════════════════
# Biblioo — application.properties
# Variáveis sensíveis carregadas do .env (raiz do projeto)
# via springboot4-dotenv (me.paulschwarz:springboot4-dotenv)
# ══════════════════════════════════════════════════════════════

spring.application.name=biblioo

# ──────────────────────────────────────────────────────────────
# springboot4-dotenv — aponta para o .env na raiz do projeto
# Por padrão o dotenv já procura ".env" no working directory
# (onde você executa "mvn spring-boot:run" ou o JAR).
# Se precisar de um caminho absoluto, use a propriedade abaixo:
# spring.dotenv.path=/caminho/absoluto/.env
# ──────────────────────────────────────────────────────────────
spring.dotenv.path=.env

# ──────────────────────────────────────────────────────────────
# DataSource — MySQL 8.4
# Porta 3306 exposta em 127.0.0.1 pelo docker-compose
# ──────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/${MYSQL_DATABASE}?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.pool-name=BibliooHikariPool

# ──────────────────────────────────────────────────────────────
# JPA / Hibernate
# ──────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ──────────────────────────────────────────────────────────────
# DEV - User Stub (Cria tabela e popula com ids 1 a 4)
# ──────────────────────────────────────────────────────────────
dev.user-stub.enabled=true

# Google Books API
google.books.api-key=${GOOGLE_BOOKS_API_KEY}


# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# Cache (Redis)
spring.cache.type=redis
spring.cache.redis.cache-null-values=false

# Pool padrão do Spring (requisições HTTP, tarefas genéricas)
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=200
spring.task.execution.thread-name-prefix=biblioo-

# OpenSearch
opensearch.host=${OPENSEARCH_HOST:localhost}
opensearch.port=${OPENSEARCH_PORT:9200}

# JWT
jwt.secret=${JWT_SECRET}
jwt.access-token-expiration=3600
jwt.refresh-token-expiration-days=7

cloudinary.url=${CLOUDINARY_URL}

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}
spring.rabbitmq.virtual-host=${RABBITMQ_VHOST:/}

# Multipart — limite alinhado com a validação do controller (5MB)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
# Permite o Tomcat consumir o restante do corpo antes de fechar a conexão,
# evitando que o cliente receba NetworkError ao invés do 400
server.tomcat.max-swallow-size=-1

# Cache TTLs — perfil de usuário: 5 min
spring.cache.redis.time-to-live=300000