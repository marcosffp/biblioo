# ══════════════════════════════════════════════════════════════
# Biblioo — application.properties
# Variáveis sensíveis carregadas do .env (raiz do projeto)
# via springboot4-dotenv (me.paulschwarz:springboot4-dotenv)
# ══════════════════════════════════════════════════════════════

spring.application.name=biblioo

# ──────────────────────────────────────────────────────────────
# springboot4-dotenv — aponta para o .env na raiz do projeto
# Por padrão o dotenv já procura ".env" no working directory
# (onde você executa "mvn spring-boot:run" ou o JAR).
# Se precisar de um caminho absoluto, use a propriedade abaixo:
# spring.dotenv.path=/caminho/absoluto/.env
# ──────────────────────────────────────────────────────────────
spring.dotenv.path=.env

# ──────────────────────────────────────────────────────────────
# DataSource — MySQL 8.4
# Porta 3306 exposta em 127.0.0.1 pelo docker-compose
# ──────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/${MYSQL_DATABASE}?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.pool-name=BibliooHikariPool

# ──────────────────────────────────────────────────────────────
# JPA / Hibernate
# ──────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# Flyway desabilitado — schema gerenciado pelo Hibernate
spring.flyway.enabled=false

# ──────────────────────────────────────────────────────────────
# Redis 7.4
# commons-pool2 no classpath é obrigatório para o pool Lettuce
# ──────────────────────────────────────────────────────────────
spring.data.redis.host=${REDIS_BIND_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.timeout=2000ms

# Lettuce pool — requer commons-pool2 no pom.xml
spring.data.redis.lettuce.pool.enabled=true
spring.data.redis.lettuce.pool.max-active=10
spring.data.redis.lettuce.pool.max-idle=5
spring.data.redis.lettuce.pool.min-idle=2
spring.data.redis.lettuce.pool.max-wait=1000ms

# Cache Redis — TTL padrão 10 min
spring.cache.type=redis
spring.cache.redis.time-to-live=600000
spring.cache.redis.cache-null-values=false

# ──────────────────────────────────────────────────────────────
# RabbitMQ 4.0
# ──────────────────────────────────────────────────────────────
spring.rabbitmq.host=${RABBITMQ_BIND_HOST}
spring.rabbitmq.port=${RABBITMQ_PORT}
spring.rabbitmq.username=${RABBITMQ_USER}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}
spring.rabbitmq.virtual-host=${RABBITMQ_VHOST}
spring.rabbitmq.connection-timeout=5000ms

# Publisher confirms
spring.rabbitmq.publisher-confirm-type=correlated
spring.rabbitmq.publisher-returns=true
spring.rabbitmq.listener.simple.acknowledge-mode=manual
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.initial-interval=1000ms
spring.rabbitmq.listener.simple.retry.multiplier=2.0
spring.rabbitmq.listener.simple.retry.max-interval=10000ms

# ──────────────────────────────────────────────────────────────
# OpenSearch 2.18
# Segurança desabilitada em dev (DISABLE_SECURITY_PLUGIN=true)
# ──────────────────────────────────────────────────────────────
opensearch.host=${OPENSEARCH_BIND_HOST}
opensearch.port=${OPENSEARCH_PORT}
opensearch.scheme=http

# ──────────────────────────────────────────────────────────────
# Actuator
# ──────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics,prometheus,loggers
management.endpoint.health.show-details=when-authorized
management.endpoint.health.show-components=always
management.health.redis.enabled=true
management.health.rabbit.enabled=true
management.health.db.enabled=true

# Prometheus
management.prometheus.metrics.export.enabled=true
management.metrics.distribution.percentiles-histogram.http.server.requests=true

# ──────────────────────────────────────────────────────────────
# Resilience4j — Circuit Breaker / Retry / TimeLimiter
# ──────────────────────────────────────────────────────────────
resilience4j.circuitbreaker.instances.googleBooks.sliding-window-size=10
resilience4j.circuitbreaker.instances.googleBooks.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.googleBooks.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.googleBooks.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.googleBooks.register-health-indicator=true

resilience4j.retry.instances.googleBooks.max-attempts=3
resilience4j.retry.instances.googleBooks.wait-duration=500ms
resilience4j.retry.instances.googleBooks.enable-exponential-backoff=true
resilience4j.retry.instances.googleBooks.exponential-backoff-multiplier=2

resilience4j.timelimiter.instances.googleBooks.timeout-duration=3s

# ──────────────────────────────────────────────────────────────
# Logging
# ──────────────────────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.biblioo=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.flywaydb=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n