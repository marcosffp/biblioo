steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/helical-decoder-451221-i0/biblioo-repo/backend:latest', './code/back']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/helical-decoder-451221-i0/biblioo-repo/backend:latest']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    args: ['gcloud', 'run', 'deploy', 'biblioo-portfolio', '--image=us-central1-docker.pkg.dev/helical-decoder-451221-i0/biblioo-repo/backend:latest', '--region=us-central1']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    args: ['gcloud', 'run', 'deploy', 'biblioo-producao', '--image=us-central1-docker.pkg.dev/helical-decoder-451221-i0/biblioo-repo/backend:latest', '--region=us-central1']

images:
  - 'us-central1-docker.pkg.dev/helical-decoder-451221-i0/biblioo-repo/backend:latest'

options:
  logging: CLOUD_LOGGING_ONLY
